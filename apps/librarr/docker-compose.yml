services:
  librarr:
    image: ghcr.io/jeremiahm37/librarr:latest
    restart: unless-stopped
    environment:
      - LIBRARR_PORT=5050
      - LIBRARR_DB_PATH=/data/librarr.db
      - SETTINGS_FILE=/data/settings.json
      - AUTH_USERNAME=admin
      - AUTH_PASSWORD=${LIBRARR_AUTH_PASSWORD}
      - API_KEY=${LIBRARR_API_KEY}
    volumes:
      - ${APP_DATA_DIR}/data:/data
      - ${APP_DATA_DIR}/books/ebooks:/books/ebooks
      - ${APP_DATA_DIR}/books/audiobooks:/books/audiobooks
      - ${APP_DATA_DIR}/books/manga:/books/manga
    x-runtipi:
      is_main: true
      internal_port: 5050

x-runtipi:
  schema_version: 2
